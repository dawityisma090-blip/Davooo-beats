<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Audio Test - DAVOOO</title>
<style>
body{background:#111;color:#fff;font-family:Arial;padding:50px;text-align:center}
h1{color:#c9a96e;margin-bottom:30px}
.test-box{background:#222;border-radius:10px;padding:30px;margin:20px auto;max-width:500px}
button{background:#c9a96e;color:#111;border:none;padding:15px 30px;border-radius:5px;cursor:pointer;font-size:1rem;margin:10px}
button:hover{background:#b8985e}
#status{margin-top:20px;padding:15px;border-radius:5px;font-size:0.9rem}
.success{background:#1a3a1a;color:#27ae60}
.error{background:#3a1a1a;color:#e74c3c}
.info{background:#1a1a3a;color:#66a3ff}
</style>
</head>
<body>
<h1>🔊 Audio Diagnostic Test</h1>

<div class="test-box">
<h3>Test 1: Check if audio file exists</h3>
<button onclick="testFile('addis-bounce.mp3')">Test addis-bounce.mp3</button>
<button onclick="testFile('harar-nights.mp3')">Test harar-nights.mp3</button>
<div id="status"></div>
</div>

<div class="test-box">
<h3>Test 2: Try to play audio</h3>
<button onclick="playTest('addis-bounce.mp3')">▶ Play addis-bounce.mp3</button>
<button onclick="playTest('harar-nights.mp3')">▶ Play harar-nights.mp3</button>
</div>

<audio id="testAudio"></audio>

<script>
function showStatus(msg, type) {
    const div = document.getElementById('status');
    div.className = type;
    div.textContent = msg;
}

function testFile(filename) {
    showStatus('Checking: ' + filename + '...', 'info');

    fetch(filename, {method: 'HEAD'})
        .then(response => {
            if (response.ok) {
                showStatus('✅ ' + filename + ' EXISTS! (' + response.status + ')', 'success');
            } else {
                showStatus('❌ ' + filename + ' NOT FOUND (' + response.status + ')', 'error');
            }
        })
        .catch(err => {
            showStatus('❌ ERROR: ' + err.message, 'error');
        });
}

function playTest(filename) {
    const audio = document.getElementById('testAudio');
    showStatus('Loading: ' + filename + '...', 'info');

    audio.src = filename;
    audio.play()
        .then(() => {
            showStatus('✅ AUDIO PLAYING! ' + filename + ' works!', 'success');
            setTimeout(() => { audio.pause(); audio.currentTime = 0; }, 5000);
        })
        .catch(err => {
            showStatus('❌ PLAY ERROR: ' + err.message, 'error');
        });

    audio.onerror = () => {
        showStatus('❌ AUDIO ERROR: Cannot load ' + filename, 'error');
    };
}
</script>
</body>
</html>
